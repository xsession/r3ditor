# ═══════════════════════════════════════════════════════════════════
# r3ditor — Release CI/CD Pipeline
# Builds Windows (NSIS) and Linux (deb, AppImage, RPM) installers
# ═══════════════════════════════════════════════════════════════════

name: "Build Installers"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"

jobs:
  # ──────────────────────────────────────────
  # Windows NSIS Installer
  # ──────────────────────────────────────────
  build-windows:
    name: "🪟 Windows Installer (NSIS)"
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Windows installer
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload MSI (if generated)
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-installer
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: ignore
          retention-days: 30

  # ──────────────────────────────────────────
  # Linux Installers (deb, AppImage, RPM)
  # ──────────────────────────────────────────
  build-linux:
    name: "🐧 Linux Installers (deb/AppImage/RPM)"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Linux installers
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-installer
          path: |
            target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            target/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm-installer
          path: |
            target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
          retention-days: 30

  # ──────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────
  create-release:
    name: "📦 Create GitHub Release"
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-nsis-installer/*
            artifacts/windows-msi-installer/*
            artifacts/linux-deb-installer/*
            artifacts/linux-appimage/*
            artifacts/linux-rpm-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
