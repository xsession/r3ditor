<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse" fill="#60A5FA">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse" fill="#34D399">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bgGrad)" rx="12"/>

  <text x="450" y="38" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">ECS 4-Stage Frame Schedule — 60 FPS Target</text>
  <line x1="220" y1="48" x2="680" y2="48" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>

  <!-- Timeline bar -->
  <rect x="60" y="68" width="780" height="30" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="450" y="88" text-anchor="middle" fill="#94A3B8" font-size="10" font-weight="600">16.67 ms Frame Budget</text>

  <!-- Stage segments on timeline -->
  <rect x="60" y="68" width="155" height="30" rx="6" fill="#3B82F6" opacity="0.3"/>
  <text x="138" y="88" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="600">~2 ms</text>

  <rect x="215" y="68" width="195" height="30" fill="#FBBF24" opacity="0.2"/>
  <text x="313" y="88" text-anchor="middle" fill="#FCD34D" font-size="9" font-weight="600">~3 ms</text>

  <rect x="410" y="68" width="235" height="30" fill="#818CF8" opacity="0.2"/>
  <text x="528" y="88" text-anchor="middle" fill="#A5B4FC" font-size="9" font-weight="600">~5 ms</text>

  <rect x="645" y="68" width="195" height="30" rx="6" fill="#F472B6" opacity="0.2"/>
  <text x="742" y="88" text-anchor="middle" fill="#F9A8D4" font-size="9" font-weight="600">~6 ms</text>

  <!-- ═══ Stage 1: Input ═══ -->
  <rect x="40" y="120" width="180" height="350" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="120" width="180" height="40" rx="10" fill="#1D4ED8"/>
  <rect x="40" y="150" width="180" height="10" fill="#1D4ED8"/>
  <text x="130" y="146" text-anchor="middle" fill="white" font-size="13" font-weight="700">① Input</text>

  <rect x="56" y="172" width="148" height="32" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <text x="130" y="193" text-anchor="middle" fill="#93C5FD" font-size="9">Keyboard Events</text>

  <rect x="56" y="212" width="148" height="32" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <text x="130" y="233" text-anchor="middle" fill="#93C5FD" font-size="9">Mouse / Trackpad</text>

  <rect x="56" y="252" width="148" height="32" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <text x="130" y="273" text-anchor="middle" fill="#93C5FD" font-size="9">Touch Events</text>

  <rect x="56" y="292" width="148" height="32" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <text x="130" y="313" text-anchor="middle" fill="#93C5FD" font-size="9">Camera Controller</text>

  <rect x="56" y="332" width="148" height="32" rx="6" fill="#1E3A8A" opacity="0.5"/>
  <text x="130" y="353" text-anchor="middle" fill="#93C5FD" font-size="9">Command Queue</text>

  <rect x="56" y="376" width="148" height="36" rx="6" fill="#172554" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="130" y="394" text-anchor="middle" fill="#60A5FA" font-size="8" font-weight="600">⚡ Single Thread</text>
  <text x="130" y="406" text-anchor="middle" fill="#94A3B8" font-size="7">winit event loop</text>

  <!-- Stage arrow 1→2 -->
  <line x1="220" y1="300" x2="250" y2="300" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══ Stage 2: Constraint ═══ -->
  <rect x="252" y="120" width="180" height="350" rx="10" fill="#1E293B" stroke="#FBBF24" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="252" y="120" width="180" height="40" rx="10" fill="#B45309"/>
  <rect x="252" y="150" width="180" height="10" fill="#B45309"/>
  <text x="342" y="146" text-anchor="middle" fill="white" font-size="13" font-weight="700">② Constraint</text>

  <rect x="268" y="172" width="148" height="32" rx="6" fill="#78350F" opacity="0.5"/>
  <text x="342" y="193" text-anchor="middle" fill="#FCD34D" font-size="9">2D Sketch Solver</text>

  <rect x="268" y="212" width="148" height="32" rx="6" fill="#78350F" opacity="0.5"/>
  <text x="342" y="233" text-anchor="middle" fill="#FCD34D" font-size="9">3D Assembly Solver</text>

  <rect x="268" y="252" width="148" height="32" rx="6" fill="#78350F" opacity="0.5"/>
  <text x="342" y="273" text-anchor="middle" fill="#FCD34D" font-size="9">Newton-Raphson Iterate</text>

  <rect x="268" y="292" width="148" height="32" rx="6" fill="#78350F" opacity="0.5"/>
  <text x="342" y="313" text-anchor="middle" fill="#FCD34D" font-size="9">Jacobian Build (Sparse)</text>

  <rect x="268" y="332" width="148" height="32" rx="6" fill="#78350F" opacity="0.5"/>
  <text x="342" y="353" text-anchor="middle" fill="#FCD34D" font-size="9">Dimension Updates</text>

  <rect x="268" y="376" width="148" height="36" rx="6" fill="#451A03" stroke="#FBBF24" stroke-width="0.5"/>
  <text x="342" y="394" text-anchor="middle" fill="#FBBF24" font-size="8" font-weight="600">⚡ Single Thread</text>
  <text x="342" y="406" text-anchor="middle" fill="#94A3B8" font-size="7">nalgebra-sparse</text>

  <!-- Stage arrow 2→3 -->
  <line x1="432" y1="300" x2="462" y2="300" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══ Stage 3: Geometry ═══ -->
  <rect x="464" y="120" width="200" height="350" rx="10" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="464" y="120" width="200" height="40" rx="10" fill="#4338CA"/>
  <rect x="464" y="150" width="200" height="10" fill="#4338CA"/>
  <text x="564" y="146" text-anchor="middle" fill="white" font-size="13" font-weight="700">③ Geometry</text>

  <rect x="480" y="172" width="168" height="32" rx="6" fill="#312E81" opacity="0.5"/>
  <text x="564" y="193" text-anchor="middle" fill="#A5B4FC" font-size="9">B-Rep Evaluation (Truck)</text>

  <rect x="480" y="212" width="168" height="32" rx="6" fill="#312E81" opacity="0.5"/>
  <text x="564" y="233" text-anchor="middle" fill="#A5B4FC" font-size="9">Boolean Operations</text>

  <rect x="480" y="252" width="168" height="32" rx="6" fill="#312E81" opacity="0.5"/>
  <text x="564" y="273" text-anchor="middle" fill="#A5B4FC" font-size="9">Tessellation (Parallel)</text>

  <rect x="480" y="292" width="168" height="32" rx="6" fill="#312E81" opacity="0.5"/>
  <text x="564" y="313" text-anchor="middle" fill="#A5B4FC" font-size="9">Feature Tree Replay</text>

  <rect x="480" y="332" width="168" height="32" rx="6" fill="#312E81" opacity="0.5"/>
  <text x="564" y="353" text-anchor="middle" fill="#A5B4FC" font-size="9">Mesh Buffer Upload</text>

  <rect x="480" y="376" width="168" height="36" rx="6" fill="#1E1B4B" stroke="#818CF8" stroke-width="0.5"/>
  <text x="564" y="394" text-anchor="middle" fill="#818CF8" font-size="8" font-weight="600">⚡ Rayon Parallel</text>
  <text x="564" y="406" text-anchor="middle" fill="#94A3B8" font-size="7">truck + rayon par_iter</text>

  <!-- Stage arrow 3→4 -->
  <line x1="664" y1="300" x2="694" y2="300" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══ Stage 4: Render ═══ -->
  <rect x="696" y="120" width="180" height="350" rx="10" fill="#1E293B" stroke="#F472B6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="696" y="120" width="180" height="40" rx="10" fill="#BE185D"/>
  <rect x="696" y="150" width="180" height="10" fill="#BE185D"/>
  <text x="786" y="146" text-anchor="middle" fill="white" font-size="13" font-weight="700">④ Render</text>

  <rect x="712" y="172" width="148" height="32" rx="6" fill="#831843" opacity="0.5"/>
  <text x="786" y="193" text-anchor="middle" fill="#F9A8D4" font-size="9">Scene Graph Update</text>

  <rect x="712" y="212" width="148" height="32" rx="6" fill="#831843" opacity="0.5"/>
  <text x="786" y="233" text-anchor="middle" fill="#F9A8D4" font-size="9">Draw Call Batching</text>

  <rect x="712" y="252" width="148" height="32" rx="6" fill="#831843" opacity="0.5"/>
  <text x="786" y="273" text-anchor="middle" fill="#F9A8D4" font-size="9">11-Pass Pipeline</text>

  <rect x="712" y="292" width="148" height="32" rx="6" fill="#831843" opacity="0.5"/>
  <text x="786" y="313" text-anchor="middle" fill="#F9A8D4" font-size="9">egui Overlay</text>

  <rect x="712" y="332" width="148" height="32" rx="6" fill="#831843" opacity="0.5"/>
  <text x="786" y="353" text-anchor="middle" fill="#F9A8D4" font-size="9">Frame Present</text>

  <rect x="712" y="376" width="148" height="36" rx="6" fill="#500724" stroke="#F472B6" stroke-width="0.5"/>
  <text x="786" y="394" text-anchor="middle" fill="#F472B6" font-size="8" font-weight="600">⚡ GPU Bound</text>
  <text x="786" y="406" text-anchor="middle" fill="#94A3B8" font-size="7">wgpu 28 • WGSL</text>

  <!-- Bottom labels -->
  <text x="450" y="488" text-anchor="middle" fill="#64748B" font-size="9">Each stage runs sequentially within a frame • Geometry stage uses Rayon data parallelism • Render stage is GPU-bound</text>
</svg>
