<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" fill="#F472B6">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="38" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">GPU Render Pipeline — 11 Passes</text>
  <line x1="230" y1="48" x2="670" y2="48" stroke="#F472B6" stroke-width="1.5" opacity="0.5"/>

  <!-- Pass boxes arranged in pipeline flow -->
  <!-- Row 1 -->
  <rect x="40" y="75" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="98" text-anchor="middle" fill="white" font-size="11" font-weight="700">1. Z-Prepass</text>
  <text x="115" y="114" text-anchor="middle" fill="#94A3B8" font-size="8">Depth buffer only</text>
  <text x="115" y="128" text-anchor="middle" fill="#64748B" font-size="7">Early depth reject</text>

  <line x1="190" y1="107" x2="218" y2="107" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="75" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="98" text-anchor="middle" fill="white" font-size="11" font-weight="700">2. Shadow Map</text>
  <text x="295" y="114" text-anchor="middle" fill="#94A3B8" font-size="8">Cascaded shadow maps</text>
  <text x="295" y="128" text-anchor="middle" fill="#64748B" font-size="7">4 cascade levels</text>

  <line x1="370" y1="107" x2="398" y2="107" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="400" y="75" width="150" height="65" rx="8" fill="#1E293B" stroke="#F472B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="475" y="98" text-anchor="middle" fill="#F9A8D4" font-size="11" font-weight="700">3. PBR Shading</text>
  <text x="475" y="114" text-anchor="middle" fill="#94A3B8" font-size="8">Cook-Torrance BRDF</text>
  <text x="475" y="128" text-anchor="middle" fill="#64748B" font-size="7">Metallic-roughness</text>

  <line x1="550" y1="107" x2="578" y2="107" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="75" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="98" text-anchor="middle" fill="white" font-size="11" font-weight="700">4. DFM Overlay</text>
  <text x="655" y="114" text-anchor="middle" fill="#94A3B8" font-size="8">Severity heat map</text>
  <text x="655" y="128" text-anchor="middle" fill="#64748B" font-size="7">Color ramp shader</text>

  <!-- Row 2 -->
  <line x1="655" y1="140" x2="655" y2="170" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="172" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="700">5. Toolpath</text>
  <text x="655" y="211" text-anchor="middle" fill="#94A3B8" font-size="8">Animated CNC paths</text>
  <text x="655" y="225" text-anchor="middle" fill="#64748B" font-size="7">Feed rate coloring</text>

  <line x1="580" y1="204" x2="552" y2="204" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="400" y="172" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="475" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="700">6. Grid / Axes</text>
  <text x="475" y="211" text-anchor="middle" fill="#94A3B8" font-size="8">Infinite ground grid</text>
  <text x="475" y="225" text-anchor="middle" fill="#64748B" font-size="7">Anti-aliased lines</text>

  <line x1="400" y1="204" x2="372" y2="204" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="172" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="700">7. Edge Outline</text>
  <text x="295" y="211" text-anchor="middle" fill="#94A3B8" font-size="8">Sobel edge detect</text>
  <text x="295" y="225" text-anchor="middle" fill="#64748B" font-size="7">Selection highlight</text>

  <line x1="220" y1="204" x2="192" y2="204" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="172" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="700">8. SSAO</text>
  <text x="115" y="211" text-anchor="middle" fill="#94A3B8" font-size="8">Screen-space AO</text>
  <text x="115" y="225" text-anchor="middle" fill="#64748B" font-size="7">Ambient occlusion</text>

  <!-- Row 3 -->
  <line x1="115" y1="237" x2="115" y2="267" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="269" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="292" text-anchor="middle" fill="white" font-size="11" font-weight="700">9. Bloom</text>
  <text x="115" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">HDR bloom extract</text>
  <text x="115" y="322" text-anchor="middle" fill="#64748B" font-size="7">Gaussian blur</text>

  <line x1="190" y1="301" x2="218" y2="301" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="269" width="150" height="65" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="292" text-anchor="middle" fill="white" font-size="11" font-weight="700">10. FXAA</text>
  <text x="295" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">Anti-aliasing</text>
  <text x="295" y="322" text-anchor="middle" fill="#64748B" font-size="7">Subpixel quality</text>

  <line x1="370" y1="301" x2="398" y2="301" stroke="#F472B6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="400" y="269" width="150" height="65" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="475" y="292" text-anchor="middle" fill="#7DD3FC" font-size="11" font-weight="700">11. UI Overlay</text>
  <text x="475" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">egui immediate mode</text>
  <text x="475" y="322" text-anchor="middle" fill="#64748B" font-size="7">Panels • gizmos</text>

  <!-- Final output -->
  <line x1="550" y1="301" x2="598" y2="301" stroke="#34D399" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="600" y="274" width="120" height="56" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="660" y="298" text-anchor="middle" fill="white" font-size="12" font-weight="700">🖥 Display</text>
  <text x="660" y="316" text-anchor="middle" fill="#A7F3D0" font-size="8">Present to screen</text>

  <!-- Shader labels -->
  <text x="450" y="380" text-anchor="middle" fill="#94A3B8" font-size="10" font-weight="600">WGSL Shader Modules</text>

  <rect x="70" y="395" width="145" height="42" rx="6" fill="#1E293B" stroke="#F472B6" stroke-width="1"/>
  <text x="143" y="414" text-anchor="middle" fill="#F9A8D4" font-size="9" font-weight="600">pbr.wgsl</text>
  <text x="143" y="428" text-anchor="middle" fill="#64748B" font-size="7">Cook-Torrance • ACES</text>

  <rect x="230" y="395" width="130" height="42" rx="6" fill="#1E293B" stroke="#818CF8" stroke-width="1"/>
  <text x="295" y="414" text-anchor="middle" fill="#A5B4FC" font-size="9" font-weight="600">grid.wgsl</text>
  <text x="295" y="428" text-anchor="middle" fill="#64748B" font-size="7">Infinite grid</text>

  <rect x="375" y="395" width="130" height="42" rx="6" fill="#1E293B" stroke="#60A5FA" stroke-width="1"/>
  <text x="440" y="414" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="600">outline.wgsl</text>
  <text x="440" y="428" text-anchor="middle" fill="#64748B" font-size="7">Edge detection</text>

  <rect x="520" y="395" width="145" height="42" rx="6" fill="#1E293B" stroke="#FBBF24" stroke-width="1"/>
  <text x="593" y="414" text-anchor="middle" fill="#FCD34D" font-size="9" font-weight="600">dfm_viz.wgsl</text>
  <text x="593" y="428" text-anchor="middle" fill="#64748B" font-size="7">Severity color ramp</text>

  <rect x="680" y="395" width="155" height="42" rx="6" fill="#1E293B" stroke="#34D399" stroke-width="1"/>
  <text x="758" y="414" text-anchor="middle" fill="#6EE7B7" font-size="9" font-weight="600">toolpath.wgsl</text>
  <text x="758" y="428" text-anchor="middle" fill="#64748B" font-size="7">Animated feed rate</text>

  <!-- Tech stack bar -->
  <rect x="40" y="460" width="820" height="40" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="450" y="478" text-anchor="middle" fill="#64748B" font-size="9">wgpu 28.0 • Vulkan 1.3 / Metal 3 / DX12 / WebGPU • naga 28.0 WGSL compiler</text>
  <text x="450" y="492" text-anchor="middle" fill="#475569" font-size="8">Target: 60 FPS @ 2M triangles • 8 visual modes (Shaded, Wireframe, X-ray, DFM Heatmap, Toolpath, Section, Exploded, Draft)</text>
</svg>
