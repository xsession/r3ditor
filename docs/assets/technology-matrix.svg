  <rect x="30" y="260" width="160" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="110" y="279" text-anchor="middle" fill="#FB7185" font-size="9" font-weight="600">Backend</text>
  <rect x="200" y="260" width="280" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="340" y="279" text-anchor="middle" fill="#E2E8F0" font-size="9">Axum + sqlx + Redis</text>
  <rect x="490" y="260" width="200" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="590" y="279" text-anchor="middle" fill="#94A3B8" font-size="9">0.7 / 0.7 / 0.25</text>
  <rect x="700" y="260" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="279" text-anchor="middle" fill="#94A3B8" font-size="9">API + Workers</text>

