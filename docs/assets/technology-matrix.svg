  <rect x="200" y="100" width="280" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="340" y="119" text-anchor="middle" fill="#E2E8F0" font-size="9">Rust 2021 + TypeScript 5.6</text>
  <rect x="490" y="100" width="200" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="590" y="119" text-anchor="middle" fill="#94A3B8" font-size="9">Edition 2021</text>
  <rect x="700" y="100" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="119" text-anchor="middle" fill="#94A3B8" font-size="9">Core + Frontend</text>

  <!-- Row 2: GPU -->
  <rect x="30" y="132" width="160" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="110" y="151" text-anchor="middle" fill="#818CF8" font-size="9" font-weight="600">GPU</text>
  <rect x="200" y="132" width="280" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="340" y="151" text-anchor="middle" fill="#E2E8F0" font-size="9">wgpu + naga (WGSL)</text>
  <rect x="490" y="132" width="200" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="590" y="151" text-anchor="middle" fill="#94A3B8" font-size="9">28.0</text>
  <rect x="700" y="132" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="151" text-anchor="middle" fill="#94A3B8" font-size="9">Render + Compute</text>

