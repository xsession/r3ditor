  <text x="590" y="215" text-anchor="middle" fill="#94A3B8" font-size="9">0.31 / 18 / 3.4</text>
  <rect x="700" y="196" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="215" text-anchor="middle" fill="#94A3B8" font-size="9">Viewport + Panels</text>

  <!-- Row 5: Desktop -->
  <rect x="30" y="228" width="160" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="110" y="247" text-anchor="middle" fill="#38BDF8" font-size="9" font-weight="600">Desktop Shell</text>
  <rect x="200" y="228" width="280" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="340" y="247" text-anchor="middle" fill="#E2E8F0" font-size="9">Tauri 2.2 + winit</text>
  <rect x="490" y="228" width="200" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="590" y="247" text-anchor="middle" fill="#94A3B8" font-size="9">2.2 / 0.30</text>
  <rect x="700" y="228" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="247" text-anchor="middle" fill="#94A3B8" font-size="9">Cross-platform</text>

