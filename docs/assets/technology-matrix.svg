  <text x="590" y="311" text-anchor="middle" fill="#94A3B8" font-size="9">Latest</text>
  <rect x="700" y="292" width="170" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="785" y="311" text-anchor="middle" fill="#94A3B8" font-size="9">Deploy + CI/CD</text>
