<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="340" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Technology Matrix</text>
  <line x1="300" y1="46" x2="600" y2="46" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>

  <!-- Header row -->
  <rect x="30" y="60" width="160" height="34" rx="6" fill="#1D4ED8"/>
  <text x="110" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700">Category</text>
  <rect x="200" y="60" width="280" height="34" rx="6" fill="#1D4ED8"/>
  <text x="340" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700">Technology</text>
  <rect x="490" y="60" width="200" height="34" rx="6" fill="#1D4ED8"/>
  <text x="590" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700">Version</text>
  <rect x="700" y="60" width="170" height="34" rx="6" fill="#1D4ED8"/>
  <text x="785" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700">Purpose</text>

