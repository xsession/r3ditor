  <text x="110" y="311" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="600">Infrastructure</text>
  <rect x="200" y="292" width="280" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="340" y="311" text-anchor="middle" fill="#E2E8F0" font-size="9">Docker + K8s + GitHub Actions</text>
