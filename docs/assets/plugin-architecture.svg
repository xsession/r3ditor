<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" fill="#A78BFA">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="url(#bgGrad)" rx="12"/>
  <text x="450" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Plugin Architecture — WASM Runtime</text>
  <line x1="240" y1="46" x2="660" y2="46" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>

  <!-- Plugin Host -->
  <rect x="300" y="60" width="300" height="70" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="88" text-anchor="middle" fill="#C4B5FD" font-size="14" font-weight="700">Plugin Host (wasmtime 28)</text>
  <text x="450" y="108" text-anchor="middle" fill="#94A3B8" font-size="9">Registry • Manifest • Capability Checks • Hot Reload</text>

  <!-- Sandbox -->
  <rect x="100" y="155" width="700" height="50" rx="8" fill="#4C1D95" opacity="0.2" stroke="#A78BFA" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="450" y="180" text-anchor="middle" fill="#C4B5FD" font-size="10" font-weight="600">WASM Sandbox Boundary — Memory Isolated • Capability-Based Security</text>
  <text x="860" y="180" text-anchor="end" fill="#7C3AED" font-size="8">🔒</text>

  <!-- 7 Plugin categories -->
  <rect x="30" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1" filter="url(#shadow)"/>
  <text x="88" y="248" text-anchor="middle" fill="#A5B4FC" font-size="9" font-weight="700">File Import</text>
  <text x="88" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">STEP • IGES</text>
  <text x="88" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">DXF • 3MF</text>
  <rect x="42" y="290" width="90" height="16" rx="4" fill="#312E81" opacity="0.5"/>
  <text x="87" y="301" text-anchor="middle" fill="#818CF8" font-size="7">FileFormat</text>

  <rect x="155" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="1" filter="url(#shadow)"/>
  <text x="213" y="248" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="700">Material</text>
  <text x="213" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom alloys</text>
  <text x="213" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">Composites</text>
  <rect x="167" y="290" width="90" height="16" rx="4" fill="#1E3A8A" opacity="0.5"/>
  <text x="212" y="301" text-anchor="middle" fill="#60A5FA" font-size="7">MaterialLib</text>

  <rect x="280" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#34D399" stroke-width="1" filter="url(#shadow)"/>
  <text x="338" y="248" text-anchor="middle" fill="#6EE7B7" font-size="9" font-weight="700">Estimation</text>
  <text x="338" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom pricing</text>
  <text x="338" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">Cost models</text>
  <rect x="292" y="290" width="90" height="16" rx="4" fill="#064E3B" opacity="0.5"/>
  <text x="337" y="301" text-anchor="middle" fill="#34D399" font-size="7">CostModel</text>

  <rect x="405" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#FBBF24" stroke-width="1" filter="url(#shadow)"/>
  <text x="463" y="248" text-anchor="middle" fill="#FCD34D" font-size="9" font-weight="700">Post-Proc</text>
  <text x="463" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom G-code</text>
  <text x="463" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">Machine configs</text>
  <rect x="417" y="290" width="90" height="16" rx="4" fill="#78350F" opacity="0.5"/>
  <text x="462" y="301" text-anchor="middle" fill="#FBBF24" font-size="7">PostProc</text>

  <rect x="530" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#F472B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="588" y="248" text-anchor="middle" fill="#F9A8D4" font-size="9" font-weight="700">DFM Rule</text>
  <text x="588" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom checks</text>
  <text x="588" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">Industry rules</text>
  <rect x="542" y="290" width="90" height="16" rx="4" fill="#831843" opacity="0.5"/>
  <text x="587" y="301" text-anchor="middle" fill="#F472B6" font-size="7">DfmCheck</text>

  <rect x="655" y="225" width="115" height="90" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1" filter="url(#shadow)"/>
  <text x="713" y="248" text-anchor="middle" fill="#7DD3FC" font-size="9" font-weight="700">UI Panel</text>
  <text x="713" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom views</text>
  <text x="713" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">Widgets</text>
  <rect x="667" y="290" width="90" height="16" rx="4" fill="#0C4A6E" opacity="0.5"/>
  <text x="712" y="301" text-anchor="middle" fill="#38BDF8" font-size="7">UiExtension</text>

  <rect x="780" y="225" width="90" height="90" rx="8" fill="#1E293B" stroke="#FB923C" stroke-width="1" filter="url(#shadow)"/>
  <text x="825" y="248" text-anchor="middle" fill="#FDBA74" font-size="9" font-weight="700">Render</text>
  <text x="825" y="264" text-anchor="middle" fill="#94A3B8" font-size="7">Custom</text>
  <text x="825" y="278" text-anchor="middle" fill="#94A3B8" font-size="7">shaders</text>
  <rect x="789" y="290" width="72" height="16" rx="4" fill="#7C2D12" opacity="0.5"/>
  <text x="825" y="301" text-anchor="middle" fill="#FB923C" font-size="7">Shader</text>

  <!-- Arrows from host to plugins -->
  <g stroke="#A78BFA" stroke-width="1" fill="none" opacity="0.4">
    <line x1="350" y1="130" x2="88" y2="225" marker-end="url(#arr)"/>
    <line x1="380" y1="130" x2="213" y2="225" marker-end="url(#arr)"/>
    <line x1="410" y1="130" x2="338" y2="225" marker-end="url(#arr)"/>
    <line x1="450" y1="130" x2="463" y2="225" marker-end="url(#arr)"/>
    <line x1="490" y1="130" x2="588" y2="225" marker-end="url(#arr)"/>
    <line x1="530" y1="130" x2="713" y2="225" marker-end="url(#arr)"/>
    <line x1="560" y1="130" x2="825" y2="225" marker-end="url(#arr)"/>
  </g>

  <!-- Manifest format -->
  <rect x="30" y="340" width="840" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="60" y="362" fill="#C4B5FD" font-size="10" font-weight="600">Plugin Manifest (plugin.toml)</text>
  <text x="60" y="380" fill="#94A3B8" font-size="8" font-family="monospace">name = "custom-material-lib"</text>
  <text x="60" y="394" fill="#94A3B8" font-size="8" font-family="monospace">version = "1.0.0"</text>
  <text x="60" y="408" fill="#94A3B8" font-size="8" font-family="monospace">plugin_type = "MaterialLib"</text>
  <text x="380" y="380" fill="#94A3B8" font-size="8" font-family="monospace">capabilities = ["materials:read", "materials:write"]</text>
  <text x="380" y="394" fill="#94A3B8" font-size="8" font-family="monospace">entry_point = "plugin.wasm"</text>
  <text x="380" y="408" fill="#94A3B8" font-size="8" font-family="monospace">min_host_version = "0.2.0"</text>
</svg>
