<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#F8FAFC" font-size="20" font-weight="700" letter-spacing="1">r3ditor — System Architecture</text>
  <line x1="200" y1="50" x2="700" y2="50" stroke="#3B82F6" stroke-width="2" opacity="0.5"/>

  <!-- ═══ Layer 1: Presentation (Top) ═══ -->
  <text x="34" y="80" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">PRESENTATION LAYER</text>

  <!-- React/Tailwind Panel -->
  <rect x="30" y="90" width="180" height="70" rx="8" fill="url(#skyGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="120" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="700">React + Tailwind</text>
  <text x="120" y="133" text-anchor="middle" fill="#E0F2FE" font-size="9">UI Panels &amp; Controls</text>
  <text x="120" y="148" text-anchor="middle" fill="#BAE6FD" font-size="8">TypeScript • Zustand • Vite</text>

  <!-- egui Viewport -->
  <rect x="230" y="90" width="180" height="70" rx="8" fill="url(#indigoGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="320" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="700">egui Viewport</text>
  <text x="320" y="133" text-anchor="middle" fill="#E0E7FF" font-size="9">3D Editor Canvas</text>
  <text x="320" y="148" text-anchor="middle" fill="#C7D2FE" font-size="8">Immediate Mode • GPU</text>

  <!-- Tauri Shell -->
  <rect x="430" y="90" width="180" height="70" rx="8" fill="url(#blueGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="520" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="700">Tauri 2.2 Shell</text>
  <text x="520" y="133" text-anchor="middle" fill="#DBEAFE" font-size="9">Desktop Application</text>
  <text x="520" y="148" text-anchor="middle" fill="#BFDBFE" font-size="8">Win • Mac • Linux</text>

  <!-- WASM Web -->
  <rect x="630" y="90" width="240" height="70" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="750" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="700">WASM + WebGPU</text>
  <text x="750" y="133" text-anchor="middle" fill="#EDE9FE" font-size="9">Browser Runtime</text>
  <text x="750" y="148" text-anchor="middle" fill="#DDD6FE" font-size="8">wasm-meshkit • wasm-bindgen</text>

  <!-- ═══ Layer 2: Core Engine (Middle) ═══ -->
  <text x="34" y="192" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">CORE ENGINE</text>

  <!-- Editor Shell / ECS -->
  <rect x="30" y="202" width="840" height="50" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="225" text-anchor="middle" fill="#60A5FA" font-size="13" font-weight="700">Editor Shell — ECS Orchestrator</text>
  <text x="450" y="240" text-anchor="middle" fill="#94A3B8" font-size="9">Input → Constraint → Geometry → Render  (4-Stage Frame Schedule at 60 FPS)</text>

  <!-- Core crates row -->
  <rect x="30" y="268" width="200" height="100" rx="8" fill="#1E293B" stroke="#818CF8" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="292" text-anchor="middle" fill="#A5B4FC" font-size="11" font-weight="700">CAD Kernel</text>
  <text x="130" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">Truck B-Rep • NURBS</text>
  <text x="130" y="322" text-anchor="middle" fill="#94A3B8" font-size="8">Parametric Features</text>
  <text x="130" y="336" text-anchor="middle" fill="#94A3B8" font-size="8">Boolean Ops • Fillets</text>
  <rect x="42" y="346" width="56" height="16" rx="4" fill="#312E81" opacity="0.7"/>
  <text x="70" y="357" text-anchor="middle" fill="#C7D2FE" font-size="7">truck 0.6</text>
  <rect x="104" y="346" width="56" height="16" rx="4" fill="#312E81" opacity="0.7"/>
  <text x="132" y="357" text-anchor="middle" fill="#C7D2FE" font-size="7">glam</text>
  <rect x="166" y="346" width="56" height="16" rx="4" fill="#312E81" opacity="0.7"/>
  <text x="194" y="357" text-anchor="middle" fill="#C7D2FE" font-size="7">nalgebra</text>

  <rect x="246" y="268" width="200" height="100" rx="8" fill="#1E293B" stroke="#34D399" stroke-width="1" filter="url(#shadow)"/>
  <text x="346" y="292" text-anchor="middle" fill="#6EE7B7" font-size="11" font-weight="700">CAM Engine</text>
  <text x="346" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">CNC Physics • Sheet Metal</text>
  <text x="346" y="322" text-anchor="middle" fill="#94A3B8" font-size="8">Toolpath • Nesting</text>
  <text x="346" y="336" text-anchor="middle" fill="#94A3B8" font-size="8">G-code Post-processing</text>
  <rect x="258" y="346" width="80" height="16" rx="4" fill="#064E3B" opacity="0.7"/>
  <text x="298" y="357" text-anchor="middle" fill="#A7F3D0" font-size="7">7 post-procs</text>
  <rect x="344" y="346" width="90" height="16" rx="4" fill="#064E3B" opacity="0.7"/>
  <text x="389" y="357" text-anchor="middle" fill="#A7F3D0" font-size="7">23 materials</text>

  <rect x="462" y="268" width="200" height="100" rx="8" fill="#1E293B" stroke="#FBBF24" stroke-width="1" filter="url(#shadow)"/>
  <text x="562" y="292" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="700">Constraint Solver</text>
  <text x="562" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">2D Sketch Constraints</text>
  <text x="562" y="322" text-anchor="middle" fill="#94A3B8" font-size="8">3D Assembly Constraints</text>
  <text x="562" y="336" text-anchor="middle" fill="#94A3B8" font-size="8">Newton-Raphson Solver</text>
  <rect x="474" y="346" width="80" height="16" rx="4" fill="#78350F" opacity="0.7"/>
  <text x="514" y="357" text-anchor="middle" fill="#FDE68A" font-size="7">15 types</text>
  <rect x="560" y="346" width="90" height="16" rx="4" fill="#78350F" opacity="0.7"/>
  <text x="605" y="357" text-anchor="middle" fill="#FDE68A" font-size="7">sparse Jacobian</text>

  <rect x="678" y="268" width="192" height="100" rx="8" fill="#1E293B" stroke="#FB7185" stroke-width="1" filter="url(#shadow)"/>
  <text x="774" y="292" text-anchor="middle" fill="#FDA4AF" font-size="11" font-weight="700">DFM Analyzer</text>
  <text x="774" y="308" text-anchor="middle" fill="#94A3B8" font-size="8">Design for Manufacturability</text>
  <text x="774" y="322" text-anchor="middle" fill="#94A3B8" font-size="8">Rule-based Checks</text>
  <text x="774" y="336" text-anchor="middle" fill="#94A3B8" font-size="8">Severity Scoring</text>
  <rect x="690" y="346" width="72" height="16" rx="4" fill="#881337" opacity="0.7"/>
  <text x="726" y="357" text-anchor="middle" fill="#FECDD3" font-size="7">10+ rules</text>
  <rect x="768" y="346" width="90" height="16" rx="4" fill="#881337" opacity="0.7"/>
  <text x="813" y="357" text-anchor="middle" fill="#FECDD3" font-size="7">0-100 score</text>

  <!-- ═══ Layer 3: GPU / Renderer ═══ -->
  <text x="34" y="400" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">GPU ACCELERATION</text>

  <rect x="30" y="410" width="410" height="80" rx="8" fill="#1E293B" stroke="#F472B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="235" y="434" text-anchor="middle" fill="#F9A8D4" font-size="11" font-weight="700">wgpu 28 Renderer — 11-Pass Pipeline</text>
  <text x="235" y="450" text-anchor="middle" fill="#94A3B8" font-size="8">PBR Cook-Torrance • Shadow Maps • SSAO • Bloom • FXAA</text>
  <!-- Pass badges -->
  <rect x="42" y="460" width="54" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="69" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">Z-prepass</text>
  <rect x="102" y="460" width="40" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="122" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">PBR</text>
  <rect x="148" y="460" width="54" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="175" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">Shadow</text>
  <rect x="208" y="460" width="46" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="231" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">SSAO</text>
  <rect x="260" y="460" width="50" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="285" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">Outline</text>
  <rect x="316" y="460" width="50" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="341" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">Bloom</text>
  <rect x="372" y="460" width="52" height="18" rx="4" fill="#831843" opacity="0.6"/>
  <text x="398" y="473" text-anchor="middle" fill="#FBCFE8" font-size="7">FXAA</text>

  <!-- GPU Compute -->
  <rect x="460" y="410" width="200" height="80" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="434" text-anchor="middle" fill="#7DD3FC" font-size="11" font-weight="700">GPU Compute</text>
  <text x="560" y="452" text-anchor="middle" fill="#94A3B8" font-size="8">Tessellation • BVH Build</text>
  <text x="560" y="466" text-anchor="middle" fill="#94A3B8" font-size="8">Mesh Simplification</text>
  <text x="560" y="480" text-anchor="middle" fill="#94A3B8" font-size="8">5 WGSL Shaders</text>

  <!-- Plugin Runtime -->
  <rect x="678" y="410" width="192" height="80" rx="8" fill="#1E293B" stroke="#A78BFA" stroke-width="1" filter="url(#shadow)"/>
  <text x="774" y="434" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="700">Plugin Runtime</text>
  <text x="774" y="452" text-anchor="middle" fill="#94A3B8" font-size="8">wasmtime 28 Sandbox</text>
  <text x="774" y="466" text-anchor="middle" fill="#94A3B8" font-size="8">7 Plugin Categories</text>
  <text x="774" y="480" text-anchor="middle" fill="#94A3B8" font-size="8">Hot Reload • Registry</text>

  <!-- ═══ Layer 4: Infrastructure ═══ -->
  <text x="34" y="520" fill="#94A3B8" font-size="9" font-weight="600" letter-spacing="2">INFRASTRUCTURE</text>

  <rect x="30" y="530" width="175" height="70" rx="8" fill="#1E293B" stroke="#60A5FA" stroke-width="1" filter="url(#shadow)"/>
  <text x="118" y="554" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="700">API Gateway</text>
  <text x="118" y="570" text-anchor="middle" fill="#94A3B8" font-size="8">Axum 0.7 • REST/SSE</text>
  <text x="118" y="584" text-anchor="middle" fill="#94A3B8" font-size="8">JWT Auth • OpenAPI</text>

  <rect x="222" y="530" width="175" height="70" rx="8" fill="#1E293B" stroke="#34D399" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="554" text-anchor="middle" fill="#6EE7B7" font-size="11" font-weight="700">Workers</text>
  <text x="310" y="570" text-anchor="middle" fill="#94A3B8" font-size="8">CAD • Analysis • CAM</text>
  <text x="310" y="584" text-anchor="middle" fill="#94A3B8" font-size="8">Redis Stream Queue</text>

  <rect x="414" y="530" width="175" height="70" rx="8" fill="#1E293B" stroke="#FBBF24" stroke-width="1" filter="url(#shadow)"/>
  <text x="502" y="554" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="700">Database</text>
  <text x="502" y="570" text-anchor="middle" fill="#94A3B8" font-size="8">PostgreSQL 16 + Redis 7</text>
  <text x="502" y="584" text-anchor="middle" fill="#94A3B8" font-size="8">MinIO Object Storage</text>

  <rect x="606" y="530" width="264" height="70" rx="8" fill="#1E293B" stroke="#FB7185" stroke-width="1" filter="url(#shadow)"/>
  <text x="738" y="554" text-anchor="middle" fill="#FDA4AF" font-size="11" font-weight="700">Observability &amp; DevOps</text>
  <text x="738" y="570" text-anchor="middle" fill="#94A3B8" font-size="8">Prometheus • Grafana • Tracing</text>
  <text x="738" y="584" text-anchor="middle" fill="#94A3B8" font-size="8">Docker • K8s • GitHub Actions CI</text>

  <!-- Connection arrows (simplified vertical flow) -->
  <g stroke="#475569" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity="0.6">
    <line x1="120" y1="160" x2="120" y2="202"/>
    <line x1="320" y1="160" x2="320" y2="202"/>
    <line x1="520" y1="160" x2="520" y2="202"/>
    <line x1="750" y1="160" x2="750" y2="202"/>
    <line x1="130" y1="252" x2="130" y2="268"/>
    <line x1="346" y1="252" x2="346" y2="268"/>
    <line x1="562" y1="252" x2="562" y2="268"/>
    <line x1="774" y1="252" x2="774" y2="268"/>
    <line x1="235" y1="368" x2="235" y2="410"/>
    <line x1="560" y1="368" x2="560" y2="410"/>
    <line x1="774" y1="368" x2="774" y2="410"/>
    <line x1="118" y1="490" x2="118" y2="530"/>
    <line x1="310" y1="490" x2="310" y2="530"/>
    <line x1="502" y1="490" x2="502" y2="530"/>
    <line x1="774" y1="490" x2="738" y2="530"/>
  </g>
</svg>
